<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primum — Lead Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --accent3: #f7c948;
    --danger: #f76a6a;
    --success: #5cf0a0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:0.4; }

  /* LOGIN */
  .login-wrap { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background:var(--bg); }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px; width:360px; animation:fadeUp 0.4s ease; }
  .login-logo { font-family:'DM Serif Display',serif; font-size:24px; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
  .login-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); }
  .login-sub { color:var(--muted); font-size:13px; margin-bottom:28px; }
  .login-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .login-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.15s; margin-bottom:16px; }
  .login-input:focus { border-color:var(--accent); }
  .login-input::placeholder { color:var(--muted); }
  .login-btn { width:100%; padding:12px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .login-btn:hover { background:#6a58e8; }
  .login-error { color:var(--danger); font-size:12px; margin-top:10px; display:none; }

  /* TOPBAR */
  .topbar { position:sticky; top:0; z-index:100; background:rgba(10,10,15,0.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; gap:16px; height:56px; }
  .logo { font-family:'DM Serif Display',serif; font-size:18px; display:flex; align-items:center; gap:8px; }
  .logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .btn { padding:7px 16px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
  .btn:hover { background:var(--surface); border-color:rgba(255,255,255,0.15); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover { background:#6a58e8; }
  .search-wrap { flex:1; max-width:440px; position:relative; }
  .search-wrap input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:8px 16px 8px 38px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color 0.15s; }
  .search-wrap input::placeholder { color:var(--muted); }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); }

  /* MAIN */
  .main { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:28px 32px; display:grid; grid-template-columns:300px 1fr; gap:24px; align-items:start; }

  /* CONTACT CARD */
  .contact-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; position:sticky; top:72px; animation:fadeUp 0.4s ease; }
  .contact-header { padding:22px; background:linear-gradient(135deg,rgba(124,106,247,0.12),rgba(78,205,196,0.06)); border-bottom:1px solid var(--border); position:relative; }
  .contact-avatar { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-family:'DM Serif Display',serif; font-size:20px; color:#fff; margin-bottom:10px; box-shadow:0 4px 20px rgba(124,106,247,0.3); }
  .contact-name { font-family:'DM Serif Display',serif; font-size:19px; letter-spacing:-0.3px; margin-bottom:3px; }
  .contact-email { color:var(--muted); font-size:12px; }
  .priority-badge { position:absolute; top:22px; right:22px; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
  .priority-tier1 { background:rgba(92,240,160,0.15); color:var(--success); border:1px solid rgba(92,240,160,0.3); }
  .priority-tier2 { background:rgba(247,201,72,0.15); color:var(--accent3); border:1px solid rgba(247,201,72,0.3); }
  .priority-tier3 { background:rgba(247,160,106,0.12); color:#f7a06a; border:1px solid rgba(247,160,106,0.3); }
  .priority-tier4 { background:rgba(107,107,128,0.15); color:var(--muted); border:1px solid var(--border); }

  /* SCORE */
  .score-section { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:18px; }
  .score-ring { position:relative; width:68px; height:68px; flex-shrink:0; }
  .score-ring svg { transform:rotate(-90deg); }
  .score-ring-bg { fill:none; stroke:var(--surface2); stroke-width:6; }
  .score-ring-fill { fill:none; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }
  .score-number { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; }
  .score-info { flex:1; }
  .score-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
  .score-value { font-size:20px; font-weight:600; }
  .score-sub { font-size:11px; color:var(--muted); margin-top:2px; }

  /* PROPS */
  .props-list { padding:14px 22px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:10px; }
  .prop-row { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .prop-label { color:var(--muted); font-size:12px; flex-shrink:0; padding-top:1px; }
  .prop-value { font-size:12px; font-weight:500; text-align:right; word-break:break-word; }

  /* BRAND TAGS */
  .brand-tags { padding:12px 22px; display:flex; flex-wrap:wrap; gap:6px; border-bottom:1px solid var(--border); }
  .brand-tag { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; letter-spacing:0.3px; }

  /* STATUS CHIPS */
  .status-row { padding:14px 22px; display:flex; flex-wrap:wrap; gap:6px; }
  .status-chip { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); font-size:11px; font-weight:500; }
  .chip-dot { width:6px; height:6px; border-radius:50%; }

  /* RIGHT */
  .right-col { display:flex; flex-direction:column; gap:20px; }
  .section-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; animation:fadeUp 0.4s ease; }
  .section-header { padding:16px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .section-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .section-title { font-family:'DM Serif Display',serif; font-size:15px; letter-spacing:-0.2px; }
  .section-count { margin-left:auto; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:2px 10px; font-size:11px; color:var(--muted); }

  /* COURSES */
  .courses-grid { padding:18px 22px; display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; }
  .course-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px; transition:all 0.15s; position:relative; overflow:hidden; }
  .course-card:hover { border-color:rgba(255,255,255,0.15); transform:translateY(-1px); }
  .course-card-top { position:absolute; top:0; left:0; right:0; height:2px; }
  .course-brand { font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; margin-bottom:6px; }
  .course-name { font-size:12px; font-weight:500; line-height:1.4; }
  .course-date { font-size:11px; color:var(--muted); margin-top:8px; }
  .tl-tag { display:inline-flex; align-items:center; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; letter-spacing:0.3px; margin-top:6px; }

  /* TIMELINE */
  .timeline { padding:6px 0; }
  .timeline-item { display:grid; grid-template-columns:22px 1fr; gap:0 14px; padding:11px 22px; transition:background 0.15s; }
  .timeline-item:hover { background:rgba(255,255,255,0.02); }
  .timeline-line { display:flex; flex-direction:column; align-items:center; }
  .timeline-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; margin-top:3px; position:relative; z-index:1; }
  .timeline-connector { width:1px; flex:1; background:var(--border); margin-top:4px; }
  .timeline-item:last-child .timeline-connector { display:none; }
  .tl-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:3px; }
  .tl-title { font-size:13px; font-weight:500; line-height:1.4; }
  .tl-date { font-size:11px; color:var(--muted); flex-shrink:0; padding-top:1px; }
  .tl-sub { font-size:12px; color:var(--muted); line-height:1.5; }

  /* FORM FIELDS */
  .form-fields { margin-top:10px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .ff-item { display:flex; flex-direction:column; gap:2px; }
  .ff-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; }
  .ff-value { font-size:12px; font-weight:500; }

  /* ENGAGEMENT */
  .engagement-wrap { padding:18px 22px; display:flex; flex-direction:column; gap:13px; }
  .eng-row { display:flex; align-items:center; gap:12px; }
  .eng-label { font-size:12px; color:var(--muted); width:130px; flex-shrink:0; }
  .eng-bar-wrap { flex:1; height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; }
  .eng-bar { height:100%; border-radius:3px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
  .eng-value { font-size:12px; font-weight:600; width:32px; text-align:right; flex-shrink:0; }

  /* LOADING */
  .loading { padding:50px 22px; text-align:center; color:var(--muted); }
  .spinner { width:26px; height:26px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }

  /* EMPTY */
  .empty-state { padding:60px 22px; text-align:center; }
  .empty-icon { font-size:36px; margin-bottom:12px; }
  .empty-title { font-family:'DM Serif Display',serif; font-size:18px; margin-bottom:6px; }
  .empty-sub { color:var(--muted); font-size:13px; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 16px; font-size:13px; max-width:300px; z-index:1000; display:none; animation:fadeUp 0.3s ease; }
  .toast.error { border-color:rgba(247,106,106,0.5); color:var(--danger); }
  .toast.success { border-color:rgba(92,240,160,0.4); color:var(--success); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pulse { animation:pulse 1.5s ease infinite; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @media(max-width:900px) { .main { grid-template-columns:1fr; } .contact-card { position:static; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo"><div class="login-dot"></div>Primum Intelligence</div>
    <div class="login-sub">Acesso restrito — time interno</div>
    <div class="login-label">Senha de acesso</div>
    <input class="login-input" type="password" id="loginPass" placeholder="••••••••••••" />
    <button class="login-btn" onclick="doLogin()">Entrar →</button>
    <div class="login-error" id="loginError">Senha incorreta</div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" id="appWrap" style="display:none;">
  <div class="logo"><div class="logo-dot"></div>Primum Intelligence</div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="ID ou email do contato..." />
  </div>
  <div class="topbar-right">
    <button class="btn primary" onclick="loadFromSearch()">Carregar →</button>
    <button class="btn" onclick="doLogout()">Sair</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainArea" style="display:none;">
  <div id="leftCol"></div>
  <div id="rightCol" class="right-col"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG — substitua SEU_TOKEN_AQUI pelo token do Private App
// após revogar e gerar um novo no HubSpot
// ============================================================
const HS_TOKEN = '__HS_TOKEN__';
const ACCESS_HASH = '5a3b5dd7b1b02a56ba91f2c8'; // hash de Primum@2026

// ============================================================
// AUTH
// ============================================================
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(16);
}

function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (simpleHash(pass) === ACCESS_HASH) {
    sessionStorage.setItem('pi_auth', '1');
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'flex';
    document.getElementById('mainArea').style.display = 'grid';
    // Tenta carregar por URL param
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('contactId') || params.get('contact_id');
    const did = params.get('dealId') || params.get('deal_id');
    if (cid) { document.getElementById('searchInput').value = cid; loadContact(cid); }
    else if (did) loadByDeal(did);
    else showEmpty();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPass').style.borderColor = 'var(--danger)';
    setTimeout(() => {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginPass').style.borderColor = '';
    }, 2500);
  }
}

function doLogout() {
  sessionStorage.removeItem('pi_auth');
  location.reload();
}

// Auto-login se já autenticado
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') loadFromSearch(); });

  if (sessionStorage.getItem('pi_auth') === '1') {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').style.display = 'flex';
    document.getElementById('mainArea').style.display = 'grid';
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('contactId') || params.get('contact_id');
    const did = params.get('dealId') || params.get('deal_id');
    if (cid) { document.getElementById('searchInput').value = cid; loadContact(cid); }
    else if (did) loadByDeal(did);
    else showEmpty();
  }
});

// ============================================================
// BRANDS
// ============================================================
const BRANDS = {
  BWS:    { color:'#7c6af7', bg:'rgba(124,106,247,0.12)', label:'BWS' },
  MDQ:    { color:'#4ecdc4', bg:'rgba(78,205,196,0.12)',  label:'MedQ' },
  MEDQ:   { color:'#4ecdc4', bg:'rgba(78,205,196,0.12)',  label:'MedQ' },
  ARISTO: { color:'#f7c948', bg:'rgba(247,201,72,0.12)',  label:'Aristo' },
  EDUQ:   { color:'#f7934c', bg:'rgba(247,147,76,0.12)',  label:'EDUQ' },
  CBI:    { color:'#c97cf7', bg:'rgba(201,124,247,0.12)', label:'CBI' },
  OUTRO:  { color:'#6b6b80', bg:'rgba(107,107,128,0.12)', label:'Outro' },
};

function detectBrandKey(text) {
  if (!text) return 'OUTRO';
  const t = text.toUpperCase();
  if (t.includes('[BWS]') || t.includes('BWS')) return 'BWS';
  if (t.includes('[MDQ]') || t.includes('MEDQ') || t.includes('MED Q')) return 'MDQ';
  if (t.includes('[ARISTO]') || t.includes('ARISTO')) return 'ARISTO';
  if (t.includes('[EDUQ]') || t.includes('EDUQ')) return 'EDUQ';
  if (t.includes('[CBI]') || t.includes('CBI')) return 'CBI';
  return 'OUTRO';
}

function getBrand(text) { return BRANDS[detectBrandKey(text)] || BRANDS.OUTRO; }

// ============================================================
// UTILS
// ============================================================
function fmt(v, fb='—') { return (v===null||v===undefined||v==='') ? fb : v; }
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtDateShort(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function initials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
}
function tierLabel(t) { return {tier_1:'Muito Alto',tier_2:'Alto',tier_3:'Médio',tier_4:'Baixo',closed_won:'Cliente'}[t]||t||'—'; }
function tierClass(t) { return {tier_1:'priority-tier1',tier_2:'priority-tier2',tier_3:'priority-tier3',tier_4:'priority-tier4',closed_won:'priority-tier1'}[t]||'priority-tier4'; }
function lcLabel(s) { return {subscriber:'Assinante',lead:'Lead',marketingqualifiedlead:'MQL',salesqualifiedlead:'SQL',opportunity:'Oportunidade',customer:'Cliente',evangelist:'Promotor',other:'Outro'}[s]||s||'—'; }
function lsLabel(s) { return {NEW:'Novo',OPEN:'Aberto',IN_PROGRESS:'Em progresso',OPEN_DEAL:'Deal Aberto',UNQUALIFIED:'Desqualificado',ATTEMPTED_TO_CONTACT:'Tentou contato',CONNECTED:'Conectado',BAD_TIMING:'Timing ruim'}[s]||s||'—'; }
function srcLabel(s) { return {PAID_SOCIAL:'Social Pago',ORGANIC_SEARCH:'Busca Orgânica',PAID_SEARCH:'Busca Paga',EMAIL_MARKETING:'Email Marketing',SOCIAL_MEDIA:'Social Orgânico',REFERRALS:'Referência',DIRECT_TRAFFIC:'Tráfego Direto',OFFLINE:'Offline',OTHER_CAMPAIGNS:'Outras Campanhas'}[s]||s||'—'; }

function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 4000);
}

// ============================================================
// API
// ============================================================
async function hs(path) {
  const r = await fetch(`https://api.hubapi.com${path}`, {
    headers: { Authorization:`Bearer ${HS_TOKEN}`, 'Content-Type':'application/json' }
  });
  if (!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
}

async function hsPost(path, body) {
  const r = await fetch(`https://api.hubapi.com${path}`, {
    method:'POST',
    headers: { Authorization:`Bearer ${HS_TOKEN}`, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
}

async function getAssocIds(contactId, type) {
  try {
    const d = await hs(`/crm/v4/objects/contacts/${contactId}/associations/${type}?limit=50`);
    return (d.results||[]).map(r=>String(r.toObjectId||r.id)).filter(Boolean);
  } catch { return []; }
}

// ============================================================
// LOAD
// ============================================================
function loadFromSearch() {
  const v = document.getElementById('searchInput').value.trim();
  if (!v) { showToast('Informe um ID ou email'); return; }
  loadContact(v);
}

async function loadByDeal(dealId) {
  try {
    const assoc = await hs(`/crm/v4/objects/deals/${dealId}/associations/contacts?limit=1`);
    const cid = (assoc.results||[])[0]?.toObjectId;
    if (cid) loadContact(String(cid));
    else showToast('Nenhum contato associado a este negócio');
  } catch { showToast('Erro ao carregar negócio'); }
}

async function loadContact(input) {
  if (!input) { input = document.getElementById('searchInput').value.trim(); }
  if (!input) return;
  showLoading();
  try {
    let contactId = input;
    if (!/^\d+$/.test(input)) {
      const s = await hsPost('/crm/v3/objects/contacts/search', {
        filterGroups:[{filters:[{propertyName:'email',operator:'EQ',value:input}]}],
        properties:['email'],limit:1
      });
      if (!s.results?.length) throw new Error('Contato não encontrado');
      contactId = s.results[0].id;
    }

    const PROPS = [
      'firstname','lastname','email','phone','mobilephone',
      'lifecyclestage','hs_lead_status',
      'hs_predictivescoringtier','hs_predictivecontactscore_v2',
      'hs_latest_source','hs_latest_source_data_1','hs_latest_source_data_2',
      'hs_email_open','hs_email_click','hs_email_bounce',
      'hs_sales_email_last_opened','hs_sales_email_last_clicked','hs_sales_email_last_replied',
      'notes_last_updated','num_associated_deals',
      'hs_analytics_num_visits','hs_analytics_num_page_views',
      'grupo_primum','produtos_primum','historico_cursos_interesse',
      'nome_do_ultimo_formulario','perfil_medico',
      'createdate','lastmodifieddate'
    ].join(',');

    const [contact, actIds, leadIds, dealIds] = await Promise.all([
      hs(`/crm/v3/objects/contacts/${contactId}?properties=${PROPS}`),
      getAssocIds(contactId, 'activities'),
      getAssocIds(contactId, 'leads'),
      getAssocIds(contactId, 'deals'),
    ]);

    const [activities, leads, deals] = await Promise.all([
      actIds.length ? hsPost('/crm/v3/objects/activities/batch/read', {
        properties:['hs_activity_type','hs_body_preview','hs_timestamp','hs_title','hs_note_body','hs_email_subject'],
        inputs: actIds.slice(0,60).map(id=>({id}))
      }).then(d=>(d.results||[]).sort((a,b)=>(b.properties?.hs_timestamp||'').localeCompare(a.properties?.hs_timestamp||''))) : Promise.resolve([]),

      leadIds.length ? hsPost('/crm/v3/objects/leads/batch/read', {
        properties:['hs_lead_name','hs_pipeline','createdate','hs_lead_status'],
        inputs: leadIds.slice(0,20).map(id=>({id}))
      }).then(d=>d.results||[]) : Promise.resolve([]),

      dealIds.length ? hsPost('/crm/v3/objects/deals/batch/read', {
        properties:['dealname','pipeline','dealstage','amount','createdate'],
        inputs: dealIds.slice(0,20).map(id=>({id}))
      }).then(d=>d.results||[]) : Promise.resolve([]),
    ]);

    render(contact, activities, leads, deals);
  } catch(err) {
    showToast(err.message);
    showEmpty();
  }
}

// ============================================================
// RENDER
// ============================================================
function render(contact, activities, leads, deals) {
  const p = contact.properties || {};
  const name = [p.firstname, p.lastname].filter(Boolean).join(' ') || 'Sem nome';
  const score = Math.round(parseFloat(p.hs_predictivecontactscore_v2||0)*100);
  const tier = p.hs_predictivescoringtier;
  const scoreColor = score>60?'var(--success)':score>30?'var(--accent3)':'var(--accent)';
  const circ = 2*Math.PI*29;

  // Brands
  const brandSet = new Set();
  if (p.grupo_primum) p.grupo_primum.split(';').forEach(b=>brandSet.add(b.trim().toUpperCase()));
  activities.forEach(a=>{
    const t=(a.properties?.hs_body_preview||'')+(a.properties?.hs_title||'');
    const b=detectBrandKey(t);
    if(b!=='OUTRO') brandSet.add(b);
  });
  leads.forEach(l=>{
    const b=detectBrandKey(l.properties?.hs_lead_name||'');
    if(b!=='OUTRO') brandSet.add(b);
  });

  // LEFT
  document.getElementById('leftCol').innerHTML = `
    <div class="contact-card">
      <div class="contact-header">
        <div class="contact-avatar">${initials(name)}</div>
        <div class="contact-name">${name}</div>
        <div class="contact-email">${fmt(p.email)}</div>
        ${tier?`<div class="priority-badge ${tierClass(tier)}">${tierLabel(tier)}</div>`:''}
      </div>
      <div class="score-section">
        <div class="score-ring">
          <svg width="68" height="68" viewBox="0 0 68 68">
            <circle class="score-ring-bg" cx="34" cy="34" r="29"/>
            <circle class="score-ring-fill" cx="34" cy="34" r="29"
              stroke="${scoreColor}"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${circ*(1-score/100)}"/>
          </svg>
          <div class="score-number" style="color:${scoreColor}">${score}%</div>
        </div>
        <div class="score-info">
          <div class="score-label">Likelihood to Close</div>
          <div class="score-value" style="color:${scoreColor}">${score}%</div>
          <div class="score-sub">próximos 90 dias</div>
        </div>
      </div>
      <div class="props-list">
        ${propRow('Telefone', p.mobilephone||p.phone)}
        ${propRow('Perfil', p.perfil_medico)}
        ${propRow('Lifecycle', lcLabel(p.lifecyclestage))}
        ${propRow('Lead Status', lsLabel(p.hs_lead_status))}
        ${propRow('Último Form.', p.nome_do_ultimo_formulario, true)}
        ${propRow('Fonte', srcLabel(p.hs_latest_source))}
        ${propRow('Criado em', fmtDate(p.createdate))}
        ${propRow('Últ. atividade', fmtDate(p.notes_last_updated))}
        ${propRow('Negócios', p.num_associated_deals||'0')}
      </div>
      ${brandSet.size?`
        <div style="padding:6px 22px 2px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Marcas</div>
        <div class="brand-tags">
          ${[...brandSet].map(b=>{
            const br=BRANDS[b]||BRANDS.OUTRO;
            return `<span class="brand-tag" style="background:${br.bg};color:${br.color};border:1px solid ${br.color}33">${br.label}</span>`;
          }).join('')}
        </div>`:''}
      <div class="status-row">
        ${p.hs_sales_email_last_opened?`<div class="status-chip"><div class="chip-dot" style="background:var(--success)"></div>Email aberto ${fmtDateShort(p.hs_sales_email_last_opened)}</div>`:''}
        ${p.hs_sales_email_last_clicked?`<div class="status-chip"><div class="chip-dot" style="background:var(--accent2)"></div>Clicou ${fmtDateShort(p.hs_sales_email_last_clicked)}</div>`:''}
        ${p.hs_sales_email_last_replied?`<div class="status-chip"><div class="chip-dot" style="background:var(--accent3)"></div>Respondeu ${fmtDateShort(p.hs_sales_email_last_replied)}</div>`:''}
        ${parseInt(p.hs_email_bounce||0)>0?`<div class="status-chip"><div class="chip-dot" style="background:var(--danger)"></div>${p.hs_email_bounce} bounce(s)</div>`:''}
      </div>
    </div>`;

  // RIGHT
  const right = document.getElementById('rightCol');
  right.innerHTML =
    buildCourses(p, leads, activities) +
    buildTimeline(activities) +
    (deals.length ? buildDeals(deals) : '') +
    buildEngagement(p);
}

function propRow(label, value, small=false) {
  return `<div class="prop-row">
    <span class="prop-label">${label}</span>
    <span class="prop-value" style="${small?'font-size:11px;':''}">${fmt(value)}</span>
  </div>`;
}

// COURSES
function buildCourses(p, leads, activities) {
  const courses = [];
  const seen = new Set();

  function add(name, brandKey, date, source) {
    const key = name.substring(0,40);
    if (seen.has(key)) return;
    seen.add(key);
    courses.push({ name, brandKey, date, source });
  }

  if (p.produtos_primum) add(p.produtos_primum, detectBrandKey(p.nome_do_ultimo_formulario||p.produtos_primum), p.lastmodifieddate, 'Produto atual');
  if (p.historico_cursos_interesse) {
    p.historico_cursos_interesse.split(';').forEach(e=>{
      const t=e.trim();
      if(t) add(t, detectBrandKey(t), null, 'Histórico');
    });
  }
  leads.forEach(l=>{
    const n=l.properties?.hs_lead_name||'';
    if(n) add(n, detectBrandKey(n), l.properties?.createdate, 'Lead');
  });
  activities.forEach(a=>{
    const body=a.properties?.hs_body_preview||a.properties?.hs_note_body||'';
    if(body.toLowerCase().includes('enviou')&&body.length>20) add(body.substring(0,100), detectBrandKey(body), a.properties?.hs_timestamp, 'Formulário');
  });

  if (!courses.length) return `<div class="section-card"><div class="section-header"><div class="section-icon" style="background:rgba(124,106,247,.12)">🎓</div><div class="section-title">Cursos de Interesse</div></div><div style="padding:30px;text-align:center;color:var(--muted);font-size:13px">Nenhum curso identificado</div></div>`;

  return `<div class="section-card">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(124,106,247,.12)">🎓</div>
      <div class="section-title">Cursos de Interesse</div>
      <div class="section-count">${courses.length}</div>
    </div>
    <div class="courses-grid">
      ${courses.map(c=>{
        const br=BRANDS[c.brandKey]||BRANDS.OUTRO;
        return `<div class="course-card" style="border-color:${br.color}22">
          <div class="course-card-top" style="background:${br.color};opacity:.5"></div>
          <div class="course-brand" style="color:${br.color}">${br.label}</div>
          <div class="course-name">${c.name}</div>
          ${c.date?`<div class="course-date">${fmtDate(c.date)}</div>`:''}
          <span class="tl-tag" style="background:${br.bg};color:${br.color}">${c.source}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// TIMELINE
function buildTimeline(activities) {
  if (!activities.length) return '';
  const items = activities.slice(0,25).map(a=>{
    const ap = a.properties||{};
    const body = ap.hs_body_preview||ap.hs_note_body||ap.hs_email_subject||'';
    const title = ap.hs_title || body.substring(0,80) || `Atividade`;
    const isForm = body.toLowerCase().includes('enviou');
    const brand = isForm ? getBrand(body) : null;
    const dotColor = brand ? brand.color : 'var(--muted)';
    return `<div class="timeline-item">
      <div class="timeline-line">
        <div class="timeline-dot" style="background:${dotColor};box-shadow:0 0 5px ${dotColor}66"></div>
        <div class="timeline-connector"></div>
      </div>
      <div>
        <div class="tl-top">
          <div class="tl-title">${title}</div>
          <div class="tl-date">${fmtDateShort(ap.hs_timestamp)}</div>
        </div>
        ${body&&body!==title?`<div class="tl-sub">${body.substring(0,150)}${body.length>150?'...':''}</div>`:''}
        ${brand?`<span class="tl-tag" style="background:${brand.bg};color:${brand.color}">${brand.label}</span>`:''}
      </div>
    </div>`;
  }).join('');

  return `<div class="section-card">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(78,205,196,.12)">⚡</div>
      <div class="section-title">Timeline de Atividades</div>
      <div class="section-count">${Math.min(activities.length,25)}</div>
    </div>
    <div class="timeline">${items}</div>
  </div>`;
}

// DEALS
function buildDeals(deals) {
  const items = deals.map(d=>{
    const dp=d.properties||{};
    const br=getBrand(dp.dealname||'');
    return `<div class="timeline-item">
      <div class="timeline-line">
        <div class="timeline-dot" style="background:${br.color}"></div>
        <div class="timeline-connector"></div>
      </div>
      <div>
        <div class="tl-top">
          <div class="tl-title">${fmt(dp.dealname)}</div>
          <div class="tl-date">${fmtDateShort(dp.createdate)}</div>
        </div>
        <div class="tl-sub">Pipeline: ${fmt(dp.pipeline)} · Stage: ${fmt(dp.dealstage)}</div>
        ${dp.amount?`<div class="tl-sub">R$ ${parseFloat(dp.amount).toLocaleString('pt-BR')}</div>`:''}
      </div>
    </div>`;
  }).join('');

  return `<div class="section-card">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(247,201,72,.12)">💼</div>
      <div class="section-title">Negócios</div>
      <div class="section-count">${deals.length}</div>
    </div>
    <div class="timeline">${items}</div>
  </div>`;
}

// ENGAGEMENT
function buildEngagement(p) {
  const visits=parseInt(p.hs_analytics_num_visits||0);
  const pv=parseInt(p.hs_analytics_num_page_views||0);
  const eo=parseInt(p.hs_email_open||0);
  const ec=parseInt(p.hs_email_click||0);
  const rows=[
    {label:'Sessões no site',val:visits,max:Math.max(visits,30),color:'var(--accent)'},
    {label:'Pageviews',val:pv,max:Math.max(pv,60),color:'var(--accent2)'},
    {label:'Emails abertos',val:eo,max:Math.max(eo,ec,10),color:'var(--accent3)'},
    {label:'Emails clicados',val:ec,max:Math.max(eo,ec,10),color:'var(--success)'},
  ].map(r=>`<div class="eng-row">
    <span class="eng-label">${r.label}</span>
    <div class="eng-bar-wrap"><div class="eng-bar" style="width:${r.max?(r.val/r.max*100):0}%;background:${r.color}"></div></div>
    <span class="eng-value">${r.val}</span>
  </div>`).join('');

  return `<div class="section-card">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(92,240,160,.12)">📊</div>
      <div class="section-title">Engajamento</div>
    </div>
    <div class="engagement-wrap">${rows}</div>
  </div>`;
}

// STATES
function showLoading() {
  document.getElementById('leftCol').innerHTML = `<div class="section-card"><div class="loading"><div class="spinner"></div><div>Carregando contato...</div></div></div>`;
  document.getElementById('rightCol').innerHTML = `<div class="section-card"><div class="loading"><div class="spinner pulse"></div><div>Buscando atividades...</div></div></div>`;
}

function showEmpty() {
  document.getElementById('leftCol').innerHTML = '';
  document.getElementById('rightCol').innerHTML = `
    <div class="section-card">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Buscar um lead</div>
        <div class="empty-sub">Digite o ID ou email do contato na barra de busca acima</div>
      </div>
    </div>`;
}
</script>
