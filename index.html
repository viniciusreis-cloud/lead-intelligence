<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primum · Lead Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:        #0d0f14;
  --card:      #13161d;
  --card2:     #181c24;
  --border:    rgba(255,255,255,.07);
  --text:      #e8eaf0;
  --muted:     #6b7280;
  --dim:       #3a4050;
  --aristo:    #f5a623;
  --aristo-bg: rgba(245,166,35,.08);
  --aristo-bd: rgba(245,166,35,.22);
  --green:     #22c55e;
  --green-bg:  rgba(34,197,94,.08);
  --red:       #ef4444;
  --red-bg:    rgba(239,68,68,.08);
  --blue:      #38bdf8;
  --blue-bg:   rgba(56,189,248,.08);
  --purple:    #a78bfa;
  --purple-bg: rgba(167,139,250,.08);
  --r: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,.5),0 12px 40px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.login-logo{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--aristo);margin-bottom:4px}
.login-logo span{color:var(--muted);font-weight:400;font-size:14px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;transition:border-color .2s}
.field input:focus{outline:none;border-color:var(--aristo)}
.btn{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:8px;padding:11px 20px;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--aristo);color:#000}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{opacity:.8}
.login-error{color:var(--red);font-size:12px;margin-top:10px;display:none;text-align:center}

/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.topbar-logo{font-size:14px;font-weight:700;letter-spacing:-.3px;color:var(--aristo);white-space:nowrap}
.topbar-logo span{color:var(--muted);font-weight:400}
.topbar-search{flex:1;max-width:320px;display:flex;gap:6px}
.topbar-search input{flex:1;padding:7px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace}
.topbar-search input:focus{outline:none;border-color:var(--aristo)}
.topbar-search .btn{padding:7px 14px;font-size:12px}
.topbar-right{margin-left:auto}
.topbar-right .btn{padding:6px 14px;font-size:12px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;gap:14px;padding:14px;max-width:1280px;margin:0 auto;align-items:start}

/* LEFT CARD */
.left-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:sticky;top:52px}
.ch{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.ch-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--aristo) 0%,#c87d00 100%);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#000}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:600;line-height:1.3}
.ch-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.prio-badge{font-size:9px;font-weight:700;letter-spacing:.7px;padding:3px 8px;border-radius:20px;text-transform:uppercase;flex-shrink:0;margin-top:2px}
.pv1{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.pv2{background:var(--aristo-bg);color:var(--aristo);border:1px solid var(--aristo-bd)}
.pv3{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.pv4{background:rgba(107,114,128,.08);color:var(--muted);border:1px solid rgba(107,114,128,.2)}
.score-row{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:8px;padding:10px 12px}
.ring-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:4}
.ring-fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.s-title{font-size:11px;color:var(--muted)}
.s-val{font-size:19px;font-weight:700;line-height:1.2}
.s-sub{font-size:10px;color:var(--muted)}

/* STAGE HERO */
.stage-hero{margin:12px 16px;border-radius:10px;overflow:hidden;border:1.5px solid var(--aristo-bd);background:var(--aristo-bg)}
.stage-hero.lost{border-color:rgba(239,68,68,.3);background:var(--red-bg)}
.stage-hero.won{border-color:rgba(34,197,94,.3);background:var(--green-bg)}
.stage-hero.none{border-color:var(--border);background:var(--card2)}
.sh-top{padding:8px 12px 3px;display:flex;align-items:center;gap:6px}
.sh-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--aristo);box-shadow:0 0 6px var(--aristo);animation:glow 2s infinite}
.stage-hero.lost .sh-dot{background:var(--red);box-shadow:0 0 6px var(--red);animation:none}
.stage-hero.won .sh-dot{background:var(--green);box-shadow:0 0 6px var(--green);animation:none}
.stage-hero.none .sh-dot{background:var(--muted);box-shadow:none;animation:none}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--aristo)}50%{box-shadow:0 0 12px var(--aristo),0 0 24px rgba(245,166,35,.25)}}
.sh-pipe{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--aristo);opacity:.75}
.stage-hero.lost .sh-pipe{color:var(--red)}
.stage-hero.won .sh-pipe{color:var(--green)}
.stage-hero.none .sh-pipe{color:var(--muted)}
.sh-body{padding:2px 12px 10px}
.sh-name{font-size:17px;font-weight:700;color:var(--aristo);line-height:1.2;margin-bottom:3px}
.stage-hero.lost .sh-name{color:var(--red)}
.stage-hero.won .sh-name{color:var(--green)}
.stage-hero.none .sh-name{color:var(--muted);font-size:13px;font-weight:500}
.sh-time{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.sh-time::before{content:'⏱';font-size:10px}

/* PROP ROWS */
.section-block{padding:10px 16px 4px}
.section-block-title{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.prop-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.prop-row:last-child{border-bottom:none}
.pk{font-size:12px;color:var(--muted);flex-shrink:0;max-width:48%}
.pv{font-size:12px;font-weight:500;text-align:right;word-break:break-word;max-width:52%}
.pv.hot{color:#f87171}
.pv.warm{color:var(--aristo)}
.pv.cold{color:var(--blue)}
.brand-chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px 14px}
.bchip{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 10px;border-radius:20px;background:var(--aristo-bg);color:var(--aristo);border:1px solid var(--aristo-bd)}
.blabel{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;background:transparent;color:var(--muted);border:1px solid var(--border)}

/* RIGHT COLUMN */
.right-col{display:flex;flex-direction:column;gap:12px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.shead{display:flex;align-items:center;gap:10px;padding:13px 18px 11px;border-bottom:1px solid var(--border)}
.sicon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.stitle{font-size:14px;font-weight:600;flex:1}
.scnt{font-size:11px;font-weight:600;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:var(--muted)}

/* PIPELINE */
.pipeline-wrap{padding:14px 18px 16px}
.pipe-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.pipe-label::after{content:'';flex:1;height:1px;background:var(--border)}
.steps{display:flex;align-items:flex-start}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:14px;left:calc(50% + 14px);right:calc(-50% + 14px);height:2px;background:var(--border);z-index:0}
.step.done:not(:last-child)::after{background:rgba(34,197,94,.35)}
.step.current:not(:last-child)::after{background:rgba(245,166,35,.25)}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--dim);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;z-index:1;flex-shrink:0;transition:all .2s}
.step.done .step-dot{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.step.current .step-dot{border-color:var(--aristo);background:var(--aristo-bg);box-shadow:0 0 0 4px rgba(245,166,35,.15);animation:step-pulse 2.2s infinite}
@keyframes step-pulse{0%,100%{box-shadow:0 0 0 4px rgba(245,166,35,.15)}50%{box-shadow:0 0 0 8px rgba(245,166,35,.06)}}
.step.lost .step-dot{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.step.won .step-dot{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.step.future .step-dot{opacity:.3}
.step-name{font-size:10px;font-weight:500;color:var(--muted);text-align:center;margin-top:6px;line-height:1.3}
.step.current .step-name{color:var(--aristo);font-weight:700}
.step.done .step-name{color:rgba(34,197,94,.8)}
.step.lost .step-name{color:var(--red)}
.step.won .step-name{color:var(--green)}
.step.future .step-name{opacity:.35}
.step-time{font-size:9px;color:var(--dim);text-align:center;margin-top:2px;font-family:'DM Mono',monospace}
.step.done .step-time{color:rgba(34,197,94,.55)}
.step.current .step-time{color:rgba(245,166,35,.65)}
.pipe-divider{display:flex;align-items:center;gap:10px;padding:4px 18px 2px;font-size:10px;color:var(--muted)}
.pipe-div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--aristo-bd),transparent)}
.closers-inactive{opacity:.25;pointer-events:none}

/* COURSES */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;padding:14px 18px}
.course-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden}
.cc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.cc-brand{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:4px}
.cc-name{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:6px}
.cc-date{font-size:10px;color:var(--muted);margin-bottom:6px}
.tag{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:20px;display:inline-block}

/* MEETINGS */
.meetings-list{padding:6px 0}
.meeting-row{display:flex;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);transition:background .15s}
.meeting-row:last-child{border-bottom:none}
.meeting-row:hover{background:rgba(255,255,255,.02)}
.mi-icon{font-size:18px;flex-shrink:0;padding-top:1px}
.mi-body{flex:1}
.mi-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.mi-title{font-size:13px;font-weight:600;flex:1}
.mi-outcome{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;text-transform:uppercase;letter-spacing:.4px}
.mi-meta{display:flex;gap:14px;flex-wrap:wrap}
.mi-meta span{font-size:11px;color:var(--muted)}

/* TIMELINE */
.timeline-wrap{padding:12px 18px}
.tl-item{display:flex;gap:12px;margin-bottom:2px;position:relative}
.tl-item:not(:last-child) .tl-line{position:absolute;left:13px;top:26px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;z-index:1}
.tl-body{flex:1;padding-bottom:14px}
.tl-title{font-size:12px;font-weight:500;line-height:1.4}
.tl-date{font-size:10px;color:var(--dim);margin-top:2px}

/* UTILS */
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}
.loader{display:flex;align-items:center;justify-content:center;padding:60px;gap:8px;color:var(--muted);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--aristo);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;z-index:100;background:var(--red);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Primum <span>· Lead Intelligence</span></div>
    <div class="login-sub">Acesso restrito ao time interno</div>
    <div class="field">
      <label>Senha de acesso</label>
      <input type="password" id="passInput" placeholder="••••••••••••"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginErr">Senha incorreta.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Primum <span>· Lead Intelligence</span></div>
    <div class="topbar-search">
      <input type="text" id="searchBar" placeholder="HubSpot Contact ID..."
             onkeydown="if(event.key==='Enter')loadFromBar()">
      <button class="btn btn-primary" onclick="loadFromBar()">Buscar</button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="loadDemo()">Demo</button>
    </div>
  </div>
  <div id="content">
    <div class="empty" style="padding:80px">Digite um Contact ID acima para carregar o lead.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const PROXY       = 'https://primum-proxy.vinicius-reis.workers.dev';
const ACCESS_HASH = '45f48424'; // hash simples de Primum@2026

// ═══════════════════════════════════════════════════
// STAGE MAPS
// ═══════════════════════════════════════════════════
const LEAD_STAGES = {

const DEAL_STAGES = {

  '1269225336':'Venda/Matrícula',
  '1269225337':'Perdido',
};
const LEAD_ORDER = ['1087683153','1087683154','1087683156','1269135952','1269320048'];
const DEAL_ORDER = ['1269123352','1269123353','1269225336','1269225337'];

const LEAD_TIME_KEY = {
  '1087683153':'hs_v2_cumulative_time_in_1087683153',
  '1087683154':'hs_v2_cumulative_time_in_1087683154',
  '1087683156':'hs_v2_cumulative_time_in_1087683156',
};
const DEAL_TIME_KEY = {
  '1269123352':'hs_v2_cumulative_time_in_1269123352',
  '1269123353':'hs_v2_cumulative_time_in_1269123353',
};

// Propriedades de etapa — todas no objeto lead
const STAGE_PROPS = [
  {key:'quantidade_de_followup',         label:'Follow-ups'       },
  {key:'ano_que_vai_prestar_a_prova',    label:'Ano da prova'     },
  {key:'em_que_que_voce_se_forma',       label:'Formatura em'     },
  {key:'instituicao_de_ensino_superior', label:'Instituição'      },
  {key:'prova_pretendida',               label:'Prova pretendida' },
  {key:'aristo_produto_pretendido',      label:'Produto Aristo'   },
  {key:'temperatura_do_lead',            label:'Temperatura'      },
  {key:'renovacao',                      label:'Renovação'        },
  {key:'status_da_reuniao',              label:'Status reunião'   },
  {key:'status_do_negocio',              label:'Status negócio'   },
  {key:'nivel_de_urgencia',              label:'Urgência'         },
  {key:'bant_autoridade',                label:'BANT Autoridade'  },
  {key:'bant__necessidade',              label:'BANT Necessidade' },
  {key:'link_de_pagamento_enviado',      label:'Link pagamento'   },
  {key:'motivo_do_noshow',               label:'Motivo no-show'   },
  {key:'retornar_para_sdr',              label:'Retornar ao SDR'  },
];

const BRANDS = {
  BWS:   {label:'BWS',   color:'#38bdf8',bg:'rgba(56,189,248,.1)' },
  ARISTO:{label:'Aristo',color:'#f5a623',bg:'rgba(245,166,35,.1)' },
  MEDQ:  {label:'MedQ',  color:'#a78bfa',bg:'rgba(167,139,250,.1)'},
  EDUQ:  {label:'EDUQ',  color:'#34d399',bg:'rgba(52,211,153,.1)' },
  CBI:   {label:'CBI',   color:'#f472b6',bg:'rgba(244,114,182,.1)'},
  OUTRO: {label:'Outro', color:'#6b7280',bg:'rgba(107,114,128,.1)'},
};

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function hashStr(s){
  let h=0;
  for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return(h>>>0).toString(16).slice(0,8);
}
function doLogin(){
  const v=document.getElementById('passInput').value;
  if(hashStr(v)===ACCESS_HASH){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    const id=new URLSearchParams(location.search).get('contactId');
    if(id){document.getElementById('searchBar').value=id;load(id);}
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtTime=iso=>iso?new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
function fmtMs(ms){
  if(!ms||isNaN(ms)||ms<=0) return null;
  const d=Math.floor(ms/86400000);
  return d===0?'< 1d':d===1?'1 dia':`${d} dias`;
}
const initials=(a,b)=>((a||'')[0]||'')+((b||'')[0]||'');
function detectBrand(t){
  if(!t)return'OUTRO';
  const u=t.toUpperCase();
  if(u.includes('BWS')||u.includes('B.W.S'))return'BWS';
  if(u.includes('ARISTO'))return'ARISTO';
  if(u.includes('MEDQ')||u.includes('MDQ'))return'MEDQ';
  if(u.includes('EDUQ'))return'EDUQ';
  if(u.includes('CBI'))return'CBI';
  return'OUTRO';
}
function isAristo(cp,leads,deals){
  if((cp.grupo_primum||'').toUpperCase().includes('ARISTO'))return true;
  for(const l of leads){const lp=l.properties||{};if((lp.hs_pipeline||'').toLowerCase().includes('aristo'))return true;}
  for(const d of deals){const dp=d.properties||{};if((dp.pipeline||'').toLowerCase().includes('aristo'))return true;}
  return false;
}
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  setTimeout(()=>t.style.display='none',5000);
}
function row(label,value,cls=''){
  const bad=['','null','undefined','-','0','false'];
  if(!value||bad.includes(String(value).trim()))return'';
  return`<div class="prop-row"><span class="pk">${label}</span><span class="pv ${cls}">${value}</span></div>`;
}

// ═══════════════════════════════════════════════════
// API — usa proxy Cloudflare (sem token no browser)
// ═══════════════════════════════════════════════════
async function hs(path){
  const r=await fetch(`${PROXY}${path}`,{headers:{'Content-Type':'application/json'}});
  if(!r.ok)throw new Error(`API ${r.status}: ${path}`);
  return r.json();
}
async function hsPost(path,body){
  const r=await fetch(`${PROXY}${path}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(`API ${r.status}: ${path}`);
  return r.json();
}

// ═══════════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════════
function loadFromBar(){
  const id=document.getElementById('searchBar').value.trim();
  if(id)load(id);
}

async function load(cid){
  document.getElementById('searchBar').value=cid;
  document.getElementById('content').innerHTML='<div class="loader"><div class="spinner"></div> Carregando contato...</div>';
  try{
    const cProps=[
      'firstname','lastname','email','phone',
      'lifecyclestage','lead_status',
      'hs_predictivecontactscore_v2','hs_predictivescoringtier',
      'nome_do_ultimo_formulario','hs_analytics_source',
      'createdate','notes_last_updated','num_associated_deals',
      'perfil','grupo_primum','produtos_primum','historico_cursos_interesse',
      'hs_email_open','hs_email_click','hs_email_replied','hs_email_bounce',
    ].join(',');

    const contact=await hs(`/crm/v3/objects/contacts/${cid}?properties=${cProps}`);

    const[la,da,ma,na]=await Promise.all([
      hs(`/crm/v3/objects/contacts/${cid}/associations/leads`).catch(()=>({results:[]})),
      hs(`/crm/v3/objects/contacts/${cid}/associations/deals`).catch(()=>({results:[]})),
      hs(`/crm/v3/objects/contacts/${cid}/associations/meetings`).catch(()=>({results:[]})),
      hs(`/crm/v3/objects/contacts/${cid}/associations/notes`).catch(()=>({results:[]})),
    ]);

    const ids=a=>(a.results||[]).map(x=>x.id||x.toObjectId).filter(Boolean);
    const[leadIds,dealIds,meetIds,noteIds]=[ids(la),ids(da),ids(ma),ids(na)];

    const leadProps=[
      'hs_lead_name','hs_pipeline','hs_pipeline_stage','createdate',
      ...STAGE_PROPS.map(s=>s.key),
      ...Object.values(LEAD_TIME_KEY),
    ];
    const dealProps=[
      'dealname','pipeline','dealstage','amount','createdate',
      ...Object.values(DEAL_TIME_KEY),
    ];

    const[leads,deals,meetings,notes]=await Promise.all([
      leadIds.length?hsPost('/crm/v3/objects/leads/batch/read',{properties:leadProps,inputs:leadIds.slice(0,20).map(id=>({id}))}).then(d=>d.results||[]):Promise.resolve([]),
      dealIds.length?hsPost('/crm/v3/objects/deals/batch/read',{properties:dealProps,inputs:dealIds.slice(0,20).map(id=>({id}))}).then(d=>d.results||[]):Promise.resolve([]),
      meetIds.length?hsPost('/crm/v3/objects/meetings/batch/read',{properties:['hs_meeting_title','hs_timestamp','hs_meeting_start_time','hs_createdate','hs_meeting_outcome'],inputs:meetIds.slice(0,20).map(id=>({id}))}).then(d=>d.results||[]):Promise.resolve([]),
      noteIds.length?hsPost('/crm/v3/objects/notes/batch/read',{properties:['hs_note_body','hs_body_preview','hs_timestamp'],inputs:noteIds.slice(0,30).map(id=>({id}))}).then(d=>d.results||[]):Promise.resolve([]),
    ]);

    render(contact,leads,deals,meetings,notes);
  }catch(err){
    showToast(err.message);
    document.getElementById('content').innerHTML=`<div class="empty">❌ ${err.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(contact,leads,deals,meetings,notes){
  const p=contact.properties||{};

  // find aristo lead & deal
  const aristoLead=leads.find(l=>{
    const lp=l.properties||{};
    return(lp.hs_pipeline||'').toLowerCase().includes('aristo')||
           LEAD_ORDER.includes(lp.hs_pipeline_stage||'');
  });
  const aristoDeal=deals.find(d=>{
    const dp=d.properties||{};
    return(dp.pipeline||'').toLowerCase().includes('aristo')||
           DEAL_ORDER.includes(dp.dealstage||'');
  });

  const lp=aristoLead?.properties||{};
  const dp=aristoDeal?.properties||{};
  const leadStage=lp.hs_pipeline_stage||null;
  const dealStage=dp.dealstage||null;

  const inClosers=!!aristoDeal;
  const activeStageName=inClosers?(DEAL_STAGES[dealStage]||'—'):(LEAD_STAGES[leadStage]||'—');
  const isLost=activeStageName==='Perdido';
  const isWon=activeStageName==='Venda/Matrícula';
  const hasAristo=isAristo(p,leads,deals);

  let activeTimeMs=null;
  if(inClosers&&dealStage&&DEAL_TIME_KEY[dealStage])activeTimeMs=parseFloat(dp[DEAL_TIME_KEY[dealStage]]);
  else if(aristoLead&&leadStage&&LEAD_TIME_KEY[leadStage])activeTimeMs=parseFloat(lp[LEAD_TIME_KEY[leadStage]]);

  // score
  const raw=parseFloat(p.hs_predictivecontactscore_v2||0);
  const score=raw>1?Math.min(Math.round(raw),999):Math.round(raw*100);
  const pct=Math.min(raw>1?raw/10:raw*100,100);
  const sc=pct>60?'#22c55e':pct>30?'#f5a623':'#ef4444';
  const C=2*Math.PI*16;
  const dash=C*(pct/100);
  const tierMap={tier_1:['MUITO ALTO','pv1'],tier_2:['ALTO','pv2'],tier_3:['MÉDIO','pv3'],tier_4:['BAIXO','pv4']};
  const[prioLbl,prioCls]=tierMap[p.hs_predictivescoringtier||'']||['—','pv4'];
  const lcMap={lead:'Lead',marketingqualifiedlead:'MQL',salesqualifiedlead:'SQL',opportunity:'Oportunidade',customer:'Cliente',subscriber:'Assinante',other:'Outro'};

  // stage props with value
  const stageData=STAGE_PROPS.filter(s=>{
    const v=lp[s.key];
    return v&&v!=='null'&&v!=='undefined'&&v!=='';
  });

  function tempCls(v){
    const u=(v||'').toLowerCase();
    if(u.includes('quente'))return'hot';
    if(u.includes('morn'))return'warm';
    if(u.includes('frio'))return'cold';
    return'';
  }

  // ─ LEFT CARD ────────────────────────────────────
  const heroClass=isLost?'lost':isWon?'won':(hasAristo&&(leadStage||dealStage))?'':'none';
  const pipeLabel=inClosers?'Closers Pipeline':'SDR Pipeline';

  const leftHTML=`
  <div class="left-card">
    <div class="ch">
      <div class="ch-top">
        <div class="avatar">${initials(p.firstname,p.lastname)||'?'}</div>
        <div class="ch-info">
          <div class="ch-name">${p.firstname||''} ${p.lastname||''}</div>
          <div class="ch-email">${p.email||'—'}</div>
        </div>
        ${p.hs_predictivescoringtier?`<span class="prio-badge ${prioCls}">${prioLbl}</span>`:''}
      </div>
      <div class="score-row">
        <div class="ring-wrap">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="ring-bg" cx="22" cy="22" r="16"/>
            <circle class="ring-fill" cx="22" cy="22" r="16"
              stroke="${sc}" stroke-dasharray="${C}" stroke-dashoffset="${C-dash}"/>
          </svg>
          <div class="ring-lbl" style="color:${sc}">${score}%</div>
        </div>
        <div>
          <div class="s-title">Likelihood to Close</div>
          <div class="s-val" style="color:${sc}">${score}%</div>
          <div class="s-sub">próximos 90 dias</div>
        </div>
      </div>
    </div>

    ${hasAristo?`
    <div class="stage-hero ${heroClass}">
      <div class="sh-top">
        <div class="sh-dot"></div>
        <div class="sh-pipe">${pipeLabel}</div>
      </div>
      <div class="sh-body">
        <div class="sh-name">${activeStageName}</div>
        <div class="sh-time">${activeTimeMs?fmtMs(activeTimeMs)+' nesta etapa':'Tempo não disponível'}</div>
      </div>
    </div>`:''}

    <div class="section-block" style="margin-top:${hasAristo?'4':'12'}px">
      <div class="section-block-title">Informações</div>
      ${row('Telefone',p.phone)}
      ${row('Lifecycle',lcMap[p.lifecyclestage]||p.lifecyclestage)}
      ${row('Lead Status',p.lead_status)}
      ${row('Último Form.',p.nome_do_ultimo_formulario)}
      ${row('Fonte',p.hs_analytics_source)}
      ${row('Criado em',fmtDate(p.createdate))}
      ${row('Últ. atividade',fmtDate(p.notes_last_updated))}
      ${row('Negócios',p.num_associated_deals)}
    </div>

    ${stageData.length?`
    <div class="section-block">
      <div class="section-block-title">Dados da Etapa</div>
      ${stageData.map(s=>row(s.label,lp[s.key],s.key==='temperatura_do_lead'?tempCls(lp[s.key]):'')).join('')}
    </div>`:''}

    ${(p.hs_email_open&&p.hs_email_open!=='0')?`
    <div class="section-block">
      <div class="section-block-title">Engajamento Email</div>
      ${row('Abertos',p.hs_email_open)}
      ${row('Clicados',p.hs_email_click)}
      ${row('Respondidos',p.hs_email_replied)}
    </div>`:''}

    ${p.grupo_primum?`<div class="brand-chips">
      <span class="bchip">${p.grupo_primum}</span>
      ${p.hs_predictivescoringtier?`<span class="blabel">${prioLbl}</span>`:''}
    </div>`:''}
  </div>`;

  // ─ PIPELINE ─────────────────────────────────────
  function stepStatus(sid,currentId,order,lostId){
    if(sid===lostId&&currentId===sid)return'lost';
    if(sid==='1269225336'&&currentId===sid)return'won';
    if(currentId===sid)return'current';
    const ci=order.indexOf(currentId),si=order.indexOf(sid);
    if(ci===-1)return'future';
    return si<ci?'done':'future';
  }
  function buildSteps(order,names,currentId,timeKeys,props,lostId){
    return order.map(sid=>{
      const st=stepStatus(sid,currentId,order,lostId);
      const ms=timeKeys[sid]?parseFloat(props[timeKeys[sid]]):null;
      const t=fmtMs(ms);
      const icon={done:'✓',lost:'✕',won:'★',current:'◉',future:'○'}[st];
      return`<div class="step ${st}">
        <div class="step-dot">${icon}</div>
        <div class="step-name">${names[sid]}</div>
        <div class="step-time">${t||''}</div>
      </div>`;
    }).join('');
  }

  const journeyHTML=hasAristo?`
  <div class="scard">
    <div class="shead">
      <div class="sicon" style="background:var(--aristo-bg)">🏆</div>
      <div class="stitle">Jornada Aristo</div>
    </div>
    <div class="pipeline-wrap">
      <div class="pipe-label">SDR Pipeline</div>
      <div class="steps">${buildSteps(LEAD_ORDER,LEAD_STAGES,leadStage,LEAD_TIME_KEY,lp,'1269320048')}</div>
    </div>
    <div class="pipe-divider">
      <div class="pipe-div-line"></div>
      <span style="white-space:nowrap;font-size:10px">→ Closers</span>
      <div class="pipe-div-line"></div>
    </div>
    <div class="pipeline-wrap ${inClosers?'':'closers-inactive'}">
      <div class="pipe-label">Closers Pipeline</div>
      <div class="steps">${buildSteps(DEAL_ORDER,DEAL_STAGES,dealStage,DEAL_TIME_KEY,dp,'1269225337')}</div>
    </div>
  </div>`:'';

  // ─ COURSES ──────────────────────────────────────
  const courses=[];const seen=new Set();
  function addC(name,brand,date,src){
    const k=(name||'').toLowerCase().replace(/\s+/g,'');
    if(!k||seen.has(k))return;seen.add(k);courses.push({name,brand,date,src});
  }
  if(p.produtos_primum)addC(p.produtos_primum,detectBrand(p.produtos_primum),p.createdate,'Produto Atual');
  leads.forEach(l=>{const lp2=l.properties||{};if(lp2.hs_lead_name)addC(lp2.hs_lead_name,detectBrand(lp2.hs_lead_name),lp2.createdate,'Lead');});
  deals.forEach(d=>{const dp2=d.properties||{};if(dp2.dealname)addC(dp2.dealname,detectBrand(dp2.dealname),dp2.createdate,'Negócio');});
  if(p.nome_do_ultimo_formulario)addC(p.nome_do_ultimo_formulario,detectBrand(p.nome_do_ultimo_formulario),p.notes_last_updated,'Formulário');

  const tagS={
    'Produto Atual':'background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.25)',
    'Lead':         'background:var(--aristo-bg);color:var(--aristo);border:1px solid var(--aristo-bd)',
    'Negócio':      'background:var(--blue-bg);color:var(--blue);border:1px solid rgba(56,189,248,.25)',
    'Formulário':   'background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.25)',
  };
  const coursesHTML=`<div class="scard">
    <div class="shead">
      <div class="sicon" style="background:var(--purple-bg)">🎓</div>
      <div class="stitle">Cursos de Interesse</div>
      ${courses.length?`<div class="scnt">${courses.length}</div>`:''}
    </div>
    ${courses.length
      ?`<div class="courses-grid">${courses.map(c=>{const br=BRANDS[c.brand]||BRANDS.OUTRO;const ts=tagS[c.src]||tagS['Formulário'];return`<div class="course-card" style="border-color:${br.color}22"><div class="cc-bar" style="background:${br.color}"></div><div class="cc-brand" style="color:${br.color}">${br.label}</div><div class="cc-name">${c.name}</div>${c.date?`<div class="cc-date">${fmtDate(c.date)}</div>`:''}<span class="tag" style="${ts}">${c.src}</span></div>`;}).join('')}</div>`
      :`<div class="empty">Nenhum curso identificado</div>`}
  </div>`;

  // ─ MEETINGS ─────────────────────────────────────
  const sortedM=[...meetings].sort((a,b)=>new Date(b.properties?.hs_timestamp||0)-new Date(a.properties?.hs_timestamp||0));
  const ocMap={
    COMPLETED:  {lbl:'Realizada',  c:'#22c55e',bg:'rgba(34,197,94,.1)' },
    NO_SHOW:    {lbl:'No-show',    c:'#ef4444',bg:'rgba(239,68,68,.1)' },
    CANCELED:   {lbl:'Cancelada',  c:'#f5a623',bg:'rgba(245,166,35,.1)'},
    RESCHEDULED:{lbl:'Reagendada', c:'#38bdf8',bg:'rgba(56,189,248,.1)'},
  };
  const meetingsHTML=`<div class="scard">
    <div class="shead">
      <div class="sicon" style="background:var(--blue-bg)">📅</div>
      <div class="stitle">Reuniões</div>
      ${sortedM.length?`<div class="scnt">${sortedM.length}</div>`:''}
    </div>
    ${sortedM.length
      ?`<div class="meetings-list">${sortedM.map(m=>{const mp=m.properties||{};const oc=ocMap[mp.hs_meeting_outcome]||null;const mDate=mp.hs_timestamp||mp.hs_meeting_start_time;return`<div class="meeting-row"><div class="mi-icon">📌</div><div class="mi-body"><div class="mi-top"><div class="mi-title">${mp.hs_meeting_title||'Reunião sem título'}</div>${oc?`<span class="mi-outcome" style="color:${oc.c};background:${oc.bg};border-color:${oc.c}44">${oc.lbl}</span>`:''}</div><div class="mi-meta">${mDate?`<span>📅 ${fmtDate(mDate)} ${fmtTime(mDate)}</span>`:''}<span>🗓 Agendada: ${fmtDate(mp.hs_createdate)}</span><span>👤 Mayara</span></div></div></div>`;}).join('')}</div>`
      :`<div class="empty">Nenhuma reunião encontrada</div>`}
  </div>`;

  // ─ TIMELINE ─────────────────────────────────────
  const tlItems=notes.filter(n=>(n.properties?.hs_note_body||n.properties?.hs_body_preview||'').trim().length>10).slice(0,20);
  const timelineHTML=tlItems.length?`<div class="scard">
    <div class="shead">
      <div class="sicon" style="background:rgba(107,114,128,.1)">⏱</div>
      <div class="stitle">Atividades Recentes</div>
      <div class="scnt">${tlItems.length}</div>
    </div>
    <div class="timeline-wrap">
      ${tlItems.map((n,i)=>{const np=n.properties||{};const body=np.hs_note_body||np.hs_body_preview||'';const br=BRANDS[detectBrand(body)]||BRANDS.OUTRO;const isForm=body.toLowerCase().includes('enviou')||body.toLowerCase().includes('preencheu');return`<div class="tl-item">${i<tlItems.length-1?'<div class="tl-line"></div>':''}<div class="tl-dot">${isForm?'📝':'💬'}</div><div class="tl-body"><div class="tl-title">${body.substring(0,90)}${body.length>90?'…':''}</div><div class="tl-date">${fmtDate(np.hs_timestamp)}</div><span class="tag" style="background:${br.bg};color:${br.color};border:1px solid ${br.color}30;margin-top:4px">${isForm?'Formulário':'Nota'}</span></div></div>`;}).join('')}
    </div>
  </div>`:'';

  // ─ ASSEMBLE ─────────────────────────────────────
  document.getElementById('content').innerHTML=`
  <div class="layout">
    ${leftHTML}
    <div class="right-col">
      ${journeyHTML}
      ${coursesHTML}
      ${meetingsHTML}
      ${timelineHTML}
    </div>
  </div>`;
}
</script>
</body>
